# nginx.conf
# Path: C:\deploy-gate\nginx.conf
#
# Reverse proxy: routes port 80 traffic to Flask on port 5000

server {
    listen 80;
    server_name _;

    # Max request size (for large feature payloads)
    client_max_body_size 1M;

    location / {
        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Health check endpoint — used by load balancers
    location /health {
        proxy_pass http://app:5000/health;
        access_log off;
    }
}