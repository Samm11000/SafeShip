# docker-compose.yml
# Path: C:\deploy-gate\docker-compose.yml
#
# Runs two containers:
#   - app:   Flask scoring API (gunicorn)
#   - nginx: Reverse proxy on port 80

version: "3.9"

services:

  app:
    build: .
    container_name: deploy-gate-app
    restart: always
    environment:
      - AWS_REGION=ap-south-1
      - S3_MODELS_BUCKET=deploy-gate-models
      - S3_DATA_BUCKET=deploy-gate-data
      - DYNAMO_TABLE=tenants
      - PORT=5000
    # Pass AWS credentials from EC2 instance role (no hardcoded keys)
    # On EC2 with an IAM role attached, boto3 picks these up automatically
    expose:
      - "5000"
    networks:
      - deploy-gate-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  nginx:
    image: nginx:alpine
    container_name: deploy-gate-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - deploy-gate-net

networks:
  deploy-gate-net:
    driver: bridge