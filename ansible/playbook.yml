---
- name: Deploy Smart Deploy Gate
  hosts: deploy_gate
  become: yes

  vars:
    app_dir: /home/ubuntu/deploy-gate

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - python3-pip
          - rsync
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Sync project files to EC2
      synchronize:
        src: "{{ playbook_dir }}/files/"
        dest: "{{ app_dir }}/"
        delete: yes
        recursive: yes
      become_user: ubuntu

    - name: Set correct ownership
      file:
        path: "{{ app_dir }}"
        state: directory
        recurse: yes
        owner: ubuntu
        group: ubuntu

    - name: Build and start containers
      shell: |
        cd {{ app_dir }}
        docker compose down 2>/dev/null || true
        docker compose build --no-cache
        docker compose up -d
      become_user: ubuntu

    - name: Wait for health check
      uri:
        url: http://localhost/health
        method: GET
        status_code: 200
      register: health
      until: health.status == 200
      retries: 12
      delay: 5

    - name: Deployment complete
      debug:
        msg:
          - "Smart Deploy Gate is LIVE"
          - "Dashboard : http://{{ ansible_host }}"
          - "Score API : http://{{ ansible_host }}/score"
          - "Demo      : http://{{ ansible_host }}/demo"