<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SafeShip — Ship With Confidence{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #07090f;
      --bg2:      #0b0f1a;
      --bg3:      #0f1520;
      --border:   rgba(99,179,255,0.10);
      --border2:  rgba(99,179,255,0.22);
      --cyan:     #63b3ff;
      --cyan-dim: rgba(99,179,255,0.10);
      --amber:    #f5a623;
      --red:      #ff4d6a;
      --green:    #00e676;
      --text:     #dce8f5;
      --muted:    #4a6a82;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(99,179,255,0.008) 2px, rgba(99,179,255,0.008) 4px);
      pointer-events: none;
      z-index: 9999;
    }
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 0 48px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(7,9,15,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-brand .ship-icon {
      width: 28px; height: 28px;
      background: var(--cyan);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .nav-brand span { color: var(--cyan); }
    .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
    .nav-links a {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      text-decoration: none; letter-spacing: 1.5px; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--cyan); }
    .nav-cta {
      font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 8px 20px;
      background: var(--cyan); color: var(--bg);
      text-decoration: none; font-weight: 700;
      transition: all 0.15s;
    }
    .nav-cta:hover { background: #fff; }
    .page-content { padding-top: 60px; min-height: 100vh; }
    .container { max-width: 1160px; margin: 0 auto; padding: 0 48px; }
    .section { padding: 80px 0; }
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      padding: 24px 28px; margin-bottom: 16px; position: relative;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--border2); }
    .card-title {
      font-family: var(--mono); font-size: 10px; color: var(--cyan);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;
    }
    .btn-primary {
      display: inline-block; font-family: var(--mono); font-size: 12px;
      letter-spacing: 1.5px; text-transform: uppercase; padding: 13px 28px;
      background: var(--cyan); color: var(--bg); border: none; cursor: pointer;
      text-decoration: none; font-weight: 700; transition: all 0.15s;
    }
    .btn-primary:hover { background: #fff; box-shadow: 0 0 32px rgba(99,179,255,0.35); }
    .btn-ghost {
      display: inline-block; font-family: var(--mono); font-size: 12px;
      letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 27px;
      background: transparent; color: var(--cyan); border: 1px solid var(--border2);
      cursor: pointer; text-decoration: none; transition: all 0.15s;
    }
    .btn-ghost:hover { background: var(--cyan-dim); border-color: var(--cyan); }
    input, textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 13px;
      padding: 12px 16px; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(99,179,255,0.08); }
    input::placeholder { color: var(--muted); }
    input[type=range] {
      -webkit-appearance: none; background: var(--bg3);
      border: 1px solid var(--border); height: 4px; padding: 0; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--cyan); border-radius: 0; cursor: pointer;
    }
    input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--cyan); cursor: pointer; }
    .badge {
      font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 3px 10px; border: 1px solid;
    }
    .badge-green  { color: var(--green); border-color: rgba(0,230,118,0.3); background: rgba(0,230,118,0.07); }
    .badge-amber  { color: var(--amber); border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.07); }
    .badge-red    { color: var(--red);   border-color: rgba(255,77,106,0.3); background: rgba(255,77,106,0.07); }
    .badge-cyan   { color: var(--cyan);  border-color: var(--border2);       background: var(--cyan-dim); }
    .badge-muted  { color: var(--muted); border-color: rgba(74,106,130,0.3); background: rgba(74,106,130,0.07); }
    .score-display { font-family: var(--mono); font-size: 72px; font-weight: 700; line-height: 1; }
    .score-safe   { color: var(--green); text-shadow: 0 0 40px rgba(0,230,118,0.4); }
    .score-warn   { color: var(--amber); text-shadow: 0 0 40px rgba(245,166,35,0.4); }
    .score-block  { color: var(--red);   text-shadow: 0 0 40px rgba(255,77,106,0.4); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .metric { background: var(--bg3); border: 1px solid var(--border); padding: 16px 20px; }
    .metric-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .metric-value { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--cyan); }
    .progress-wrap { height: 3px; background: var(--bg3); margin: 8px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--cyan); transition: width 0.5s ease; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left; }
    td { font-family: var(--mono); font-size: 11px; padding: 10px 14px; border-bottom: 1px solid rgba(99,179,255,0.04); color: var(--text); }
    tr:hover td { background: rgba(99,179,255,0.025); }
    .alert { padding: 12px 16px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.5px; margin-bottom: 16px; border-left: 2px solid; }
    .alert-error   { color: var(--red);   border-color: var(--red);   background: rgba(255,77,106,0.07); }
    .alert-success { color: var(--green); border-color: var(--green); background: rgba(0,230,118,0.07); }
    .alert-info    { color: var(--cyan);  border-color: var(--cyan);  background: rgba(99,179,255,0.07); }
    pre, code { font-family: var(--mono); background: var(--bg3); color: var(--cyan); font-size: 12px; }
    pre { padding: 20px; border: 1px solid var(--border); overflow-x: auto; line-height: 1.8; white-space: pre-wrap; }
    code { padding: 2px 6px; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border2), transparent); margin: 48px 0; }
    .section-tag { font-family: var(--mono); font-size: 10px; color: var(--cyan); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .section-tag::before { content: ''; width: 20px; height: 1px; background: var(--cyan); }
    .section-title { font-size: clamp(28px, 4vw, 48px); font-weight: 800; letter-spacing: -1.5px; margin-bottom: 16px; line-height: 1.05; }
    .phase-row { display: grid; grid-template-columns: 180px 1fr; gap: 0; border: 1px solid var(--border); margin-bottom: -1px; }
    .phase-label { padding: 16px 20px; background: var(--bg3); border-right: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--cyan); letter-spacing: 1px; display: flex; align-items: center; }
    .phase-content { padding: 16px 20px; font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .phase-tag { background: rgba(99,179,255,0.07); border: 1px solid var(--border); padding: 3px 10px; color: var(--text); font-size: 10px; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse-dot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.35; transform:scale(.6); } }
    .animate-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    .footer { border-top: 1px solid var(--border); padding: 28px 48px; display: flex; align-items: center; justify-content: space-between; margin-top: 80px; }
    .footer-brand { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .footer-links { display: flex; gap: 24px; list-style: none; }
    .footer-links a { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--cyan); }
    @media (max-width: 768px) {
      .nav { padding: 0 20px; }
      .nav-links { display: none; }
      .container { padding: 0 20px; }
      .grid-2,.grid-3,.grid-4 { grid-template-columns: 1fr; }
      .footer { flex-direction: column; gap: 16px; text-align: center; }
      .phase-row { grid-template-columns: 1fr; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="/">
    <div class="ship-icon">⚓</div>
    Safe<span>Ship</span>
  </a>
  <ul class="nav-links">
    <li><a href="/demo">Live Demo</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="https://github.com" target="_blank">GitHub</a></li>
  </ul>
  <a href="/signup" class="nav-cta">Get API Key</a>
</nav>
<div class="page-content">
  {% block content %}{% endblock %}
</div>
<footer class="footer">
  <div class="footer-brand">SAFESHIP // ML-POWERED DEPLOY RISK INTELLIGENCE</div>
  <ul class="footer-links">
    <li><a href="/demo">Demo</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/signup">Get Started</a></li>
  </ul>
</footer>
</body>
</html>
