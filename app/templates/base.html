<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Smart Deploy Gate{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a}
    .navbar{background:#534AB7;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .navbar .brand{color:#fff;font-size:18px;font-weight:600;text-decoration:none}
    .navbar .brand span{color:#CECBF6;font-weight:400}
    .container{max-width:1100px;margin:0 auto;padding:24px 16px}
    .card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:20px 24px;margin-bottom:16px}
    .card-title{font-size:14px;font-weight:600;color:#444;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
    .btn{display:inline-block;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
    .btn-primary{background:#534AB7;color:#fff}
    .btn-primary:hover{background:#3C3489}
    .btn-secondary{background:#f0f0f0;color:#444}
    .btn-secondary:hover{background:#e0e0e0}
    input,textarea{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border .15s}
    input:focus,textarea:focus{border-color:#534AB7}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
    .badge-green{background:#EAF3DE;color:#3B6D11}
    .badge-yellow{background:#FAEEDA;color:#854F0B}
    .badge-red{background:#FCEBEB;color:#A32D2D}
    .badge-purple{background:#EEEDFE;color:#3C3489}
    .badge-gray{background:#f0f0f0;color:#666}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .metric{background:#f8f8f8;border-radius:8px;padding:14px;text-align:center}
    .metric-label{font-size:12px;color:#888;margin-bottom:4px}
    .metric-value{font-size:24px;font-weight:600;color:#1a1a1a}
    .progress-bar{height:8px;background:#e5e5e5;border-radius:4px;overflow:hidden;margin:8px 0}
    .progress-fill{height:100%;background:#534AB7;border-radius:4px;transition:width .3s}
    code,pre{font-family:'Courier New',monospace;background:#f0f0f0;border-radius:6px;padding:2px 6px;font-size:13px}
    pre{padding:14px;overflow-x:auto;line-height:1.6;white-space:pre-wrap}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 12px;background:#f8f8f8;color:#666;font-weight:500;border-bottom:1px solid #e5e5e5}
    td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
    .alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px}
    .alert-error{background:#FCEBEB;color:#A32D2D;border:1px solid #f09595}
    .alert-success{background:#EAF3DE;color:#3B6D11;border:1px solid #97C459}
    @media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="navbar">
  <a class="brand" href="/">Smart Deploy <span>Gate</span></a>
  <a href="/demo" style="color:#CECBF6;font-size:13px;text-decoration:none">Try Demo</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
